version: "3"

services:
  iotpilot:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile.raspberry
    container_name: iotpilot-app
    ports:
      - "4000"  # For direct access to Node.js server
    volumes:
      - ../app:/app  # Map local app directory to container
      - iotpilot_data:/app/data  # Persistent volume for database
      - /app/node_modules  # Anonymous volume for node_modules to prevent overwriting
    environment:
      - NODE_ENV=production
      - CHOKIDAR_USEPOLLING=true
      - HOST_NAME=${HOST_NAME:-iotpilot.local}
      - PYTHON=/usr/bin/python3  # Set Python path as environment variable
    restart: unless-stopped
    # Make sure to install dependencies with Python 3 and then run the server
    command: sh -c "mkdir -p /app/data && chmod 777 /app/data && PYTHON=/usr/bin/python3 npm install --python=/usr/bin/python3 && npm run dev"
    networks:
      - iotpilot_network
    labels:
      - "traefik.enable=true"
      # Local domain routers
      - "traefik.http.routers.iotpilot-http.rule=Host(`${HOST_NAME:-iotpilot.local}`)"
      - "traefik.http.routers.iotpilot-http.entrypoints=web"
      - "traefik.http.routers.iotpilot-https.rule=Host(`${HOST_NAME:-iotpilot.local}`)"
      - "traefik.http.routers.iotpilot-https.entrypoints=websecure"
      - "traefik.http.routers.iotpilot-https.tls=true"
      # Tailscale domain router
      - "traefik.http.routers.iotpilot-tailscale.rule=Host(`${TAILSCALE_DOMAIN}`)"
      - "traefik.http.routers.iotpilot-tailscale.entrypoints=websecure"
      - "traefik.http.routers.iotpilot-tailscale.tls=true"
      # Common configuration
      - "traefik.http.services.iotpilot.loadbalancer.server.port=4000"
      # Health check to prevent Bad Gateway
      - "traefik.http.services.iotpilot.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.iotpilot.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.iotpilot.loadbalancer.healthcheck.timeout=5s"
      - "traefik.http.services.iotpilot.loadbalancer.healthcheck.retries=3"

  traefik:
    build:
      context: ..
      dockerfile: docker/traefik/Dockerfile.raspberry
    container_name: iotpilot-traefik
    ports:
      - "4080:80"      # Map HTTP port
      - "4443:443"     # Map HTTPS port
      - "8080:8080"    # Traefik Dashboard
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/config:/etc/traefik/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # To monitor containers
      - traefik_certs:/etc/traefik/acme  # For storing certificates
    networks:
      - iotpilot_network
    restart: unless-stopped
    depends_on:
      - iotpilot
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-contact@iotpilot.tk}
      - HOST_NAME=${HOST_NAME:-iotpilot.local}

  tailscale:
    build:
      context: ..
      dockerfile: docker/tailscale/Dockerfile.raspberry
    container_name: iotpilot-tailscale
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    # Share network with Traefik container
    network_mode: "service:traefik"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true  # Use userspace mode for better Raspberry Pi compatibility
      # Basic parameters without advertising routes or exit nodes
      - TS_EXTRA_ARGS=--hostname=${HOST_NAME:-iotpilot.local} --reset
    restart: unless-stopped

volumes:
  iotpilot_data:
    driver: local
  tailscale_state:
    driver: local
  traefik_certs:
    driver: local

networks:
  iotpilot_network:
    driver: bridge